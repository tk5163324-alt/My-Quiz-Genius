{% load static %}


<!DOCTYPE html>

<html lang="en">


<head>


    <meta charset="UTF-8">


    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title>QuizGenius</title>



    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">



    <link rel="stylesheet" href="{% static 'css/style.css' %}">


</head>



<body>


    <nav class="navbar navbar-expand-lg navbar-light" style="background: linear-gradient(90deg,#0d47a1,#42a5f5);">


        <div class="container">



            <a class="navbar-brand fw-bold text-dark" href="/">

                🧠 QuizGenius

            </a>



            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">


                <span class="navbar-toggler-icon"></span>


            </button>






            <div class="collapse navbar-collapse" id="navbarNav">



                <ul class="navbar-nav ms-auto">





                    <li class="nav-item">

                        <a class="nav-link fw-semibold text-dark" href="/">

                            Home

                        </a>

                    </li>





                    <li class="nav-item">

                        <a class="nav-link fw-semibold text-dark" href="/quiz/">

                            Quiz

                        </a>

                    </li>






                    <li class="nav-item">

                        <a class="nav-link fw-semibold text-dark" href="/leaderboard/">

                            Leaderboard

                        </a>

                    </li>






                    {% if user.is_authenticated %}





                    <li class="nav-item">

                        <a class="nav-link fw-semibold text-dark" href="/profile/">

                            Profile

                        </a>

                    </li>






                    <li class="nav-item">

                        <a class="nav-link fw-semibold text-danger" href="/logout/">

                            Logout

                        </a>

                    </li>






                    {% else %}





                    <li class="nav-item">

                        <a class="nav-link fw-semibold text-dark" href="/login/">

                            Login

                        </a>

                    </li>






                    <li class="nav-item">

                        <a class="nav-link fw-semibold text-dark" href="/register/">

                            Register

                        </a>

                    </li>






                    {% endif %}





                </ul>




            </div>




        </div>


    </nav>






    <div class="container mt-4">


        {% block content %}


        {% endblock %}


    </div>







    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">

    </script>



</body>


</html>
